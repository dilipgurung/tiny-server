project_name: tiny-server

builds:
  - id: tiny-server
    main: ./cmd/tiny-server
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X "main.tinyServerVersion={{.Version}}"
      - -s -w -X "main.goVersion={{.Env.GOVERSION}}"

archives:
  - id: tar.gz
    format: tar.gz
  - id: binary
    format: binary

# Use GitHub's native release-notes generator (the same engine behind the
# "Generate release notes" button). Categories and exclusions are defined in
# .github/release.yml and are based on PR labels.
changelog:
  use: github-native
